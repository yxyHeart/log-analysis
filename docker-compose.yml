services:
  logscope:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - RAG_SERVICE_URL=http://rag-service:8000
    depends_on:
      rag-service:
        condition: service_healthy
    networks:
      - logscope-net

  rag-service:
    build:
      context: ./rag-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - rag-chroma-data:/app/chroma_data
      - rag-uploads:/app/uploads
      - rag-model-cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - logscope-net

volumes:
  rag-chroma-data:
  rag-uploads:
  rag-model-cache:

networks:
  logscope-net:
    driver: bridge
